alias: "Battery: Reserve Estimator"
description: >
  Estimate how many full days (up to 7) the house can run from current battery
  reserves plus solar forecast, using hourly simulation with no hourly deficits
  allowed below the permitted floor. Then calculate the minimum starting battery
  charge required for that many days by working backwards hour by hour. Stores
  -1 if no usable solution can be found.
triggers:
  - minutes: /15
    trigger: time_pattern
  - entity_id:
      - sensor.battery_wh
      - sensor.estimated_daily_power_draw
      - input_number.battery_false_floor_wh
      - input_number.sell_by_wh
    trigger: state
actions:
  - action: recorder.get_statistics
    data:
      statistic_ids:
        - sensor.goodwe_house_consumption
      # Use midnight-aligned N-8..N-1 history window so current-day partial
      # data is excluded and each historical day is complete.
      start_time: >-
        {{ (now() - timedelta(days=8)).replace(hour=0, minute=0, second=0, microsecond=0).isoformat() }}
      end_time: >-
        {{ (now() - timedelta(days=1)).replace(hour=0, minute=0, second=0, microsecond=0).isoformat() }}
      period: hour
      types:
        - mean
    response_variable: house_consumption_stats
  - variables:
      forecast_entities:
        - sensor.home_energy_production_today
        - sensor.home_energy_production_tomorrow
        - sensor.home_energy_production_d2
        - sensor.home_energy_production_d3
        - sensor.home_energy_production_d4
        - sensor.home_energy_production_d5
        - sensor.home_energy_production_d6
        - sensor.home_energy_production_d7
        - sensor.home_energy_production_today_2
        - sensor.home_energy_production_tomorrow_2
        - sensor.home_energy_production_d2_2
        - sensor.home_energy_production_d3_2
        - sensor.home_energy_production_d4_2
        - sensor.home_energy_production_d5_2
        - sensor.home_energy_production_d6_2
        - sensor.home_energy_production_d7_2
      current_battery_entity: sensor.actual_battery_capacity_remaining
      daily_draw_entity: sensor.estimated_daily_power_draw
      battery_floor_entity: input_number.battery_false_floor_wh
      sell_by_wh_entity: input_number.sell_by_wh
      required_battery_kwh_entity: input_number.required_battery_kwh
      zero_draw_days_entity: input_number.zero_draw_days_possible
      max_battery_level: input_number.battery_est_max_level_wh
      safe_export_kwh_entity: input_number.battery_safe_export_kwh
      export_window_start_hour: 18
      export_window_end_hour: 20
      max_export_kwh_per_hour: 10
      max_days: 7
      historical_usage_estimate_json: >-
        {% set daily_draw_kwh = states(daily_draw_entity) | float(none) %} {%
        set daily_draw_wh = (daily_draw_kwh * 1000) if daily_draw_kwh is not
        none else none %}

        {% set stats_root = house_consumption_stats.get('statistics', {}) if
        house_consumption_stats is mapping else {} %} {% set rows =
        stats_root.get('sensor.goodwe_house_consumption', []) if stats_root is
        mapping else [] %}

        {% set ns = namespace(hours_by_day={}, totals={}, counts={}) %}

        {% for row in rows %}
          {% if row is mapping %}
            {% set start = row.get('start') %}
            {% set usage = row.get('mean', none) %}
            {% set usage = usage | float(0) if usage is not none else none %}

            {% if usage is not none and usage < 0 %}
              {% set usage = 0 %}
            {% endif %}

            {% if start is not none and usage is not none %}
              {% set start_dt = as_datetime(start) %}
              {% set start_local = as_local(start_dt) if start_dt is not none else none %}
              {% set day_key = start_local.strftime('%Y-%m-%d') if start_local is not none else none %}
              {% set hour_key = start_local.strftime('%H') if start_local is not none else none %}

              {% if day_key is not none and hour_key is not none %}
                {% set existing_day = ns.hours_by_day.get(day_key, {}) %}
                {% set ns.hours_by_day = ns.hours_by_day | combine({
                  day_key: existing_day | combine({hour_key: usage})
                }) %}
                {% set ns.totals = ns.totals | combine({
                  day_key: (ns.totals.get(day_key, 0) | float(0)) + usage
                }) %}
                {% set ns.counts = ns.counts | combine({
                  day_key: (ns.counts.get(day_key, 0) | int(0)) + 1
                }) %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}

        {% set out = namespace(days={}) %} {% for day_key in
        ns.hours_by_day.keys() | list | sort %}
          {% set day_hours = ns.hours_by_day.get(day_key, {}) %}
          {% set total = ns.totals.get(day_key, 0) | float(0) %}
          {% set count = ns.counts.get(day_key, 0) | int(0) %}
          {% set scale = 1 %}

          {% if daily_draw_wh is not none and count == 24 and total > 0 and total < (daily_draw_wh | float(0)) %}
            {% set scale = (daily_draw_wh | float(0)) / total %}
          {% endif %}

          {% set out.days = out.days | combine({
            day_key: {
              'scale': scale,
              'hours': day_hours
            }
          }) %}
        {% endfor %}

        {{ out.days | to_json }}
      result_sufficiency: >-
        {% set current_battery_wh = states(current_battery_entity) | float(none)
        %} {% set battery_floor_wh = states(battery_floor_entity) | float(none) %}
        {% set daily_draw_kwh = states(daily_draw_entity) | float(none) %} {%
        set daily_draw_wh = (daily_draw_kwh * 1000) if daily_draw_kwh is not
        none else none %} {% set hourly_draw_wh = (daily_draw_wh / 24) if
        daily_draw_wh is not none else none %} {% set historical_usage =
        historical_usage_estimate_json | from_json if
        historical_usage_estimate_json is string else {} %}

        {% if current_battery_wh is none or battery_floor_wh is none or
        hourly_draw_wh is none %}
          -1|0|0|0|{{ current_battery_wh if current_battery_wh is not none else 'none' }}|{{ hourly_draw_wh if hourly_draw_wh is not none else 'none' }}
        {% else %}
          {% set ns = namespace(
            merged={},
            days=[],
            best_days=0,
            best_required=-1,
            best_max_battery=current_battery_wh,
            hours_found=0,
            found=false
          ) %}

          {# include the current hour, not only times strictly after now #}
          {% set current_hour_ts = as_timestamp(now().replace(minute=0, second=0, microsecond=0)) %}

          {# merge all wh_period entries by hour #}
          {% for ent in forecast_entities %}
            {% set wp = state_attr(ent, 'wh_period') %}
            {% if wp is mapping %}
              {% for ts, val in wp.items() %}
                {% set t = as_timestamp(ts, default=none) %}
                {% if t is not none and t >= current_hour_ts %}
                  {% set hour_key = as_datetime(ts).strftime('%Y-%m-%dT%H:00:00') %}
                  {% set existing = ns.merged.get(hour_key, 0) | float(0) %}
                  {% set ns.merged = ns.merged | combine({hour_key: existing + (val | float(0))}) %}
                {% endif %}
              {% endfor %}
            {% endif %}
          {% endfor %}

          {% set forecast_hours = ns.merged.keys() | list | sort %}
          {% set ns.hours_found = forecast_hours | count %}

          {% if ns.hours_found == 0 %}
            -1|0|0|0|{{ current_battery_wh }}|{{ hourly_draw_wh }}|0|0
          {% else %}
            {% for h in forecast_hours %}
              {% set d = h[:10] %}
              {% if d not in ns.days %}
                {% set ns.days = ns.days + [d] %}
              {% endif %}
            {% endfor %}

            {% set forecast_days = ns.days[:max_days] %}
            {% set usable_day_count = forecast_days | count %}
            {% if usable_day_count == 0 %}
              -1|0|{{ ns.hours_found }}|0|{{ current_battery_wh }}|{{ hourly_draw_wh }}
            {% else %}
              {% for day_count in range(usable_day_count, 0, -1) %}
                {% if not ns.found %}
                  {% set candidate_days = forecast_days[:day_count] %}
                  {% set hrs = namespace(out=[]) %}
                  {% set usage = namespace(by_hour={}) %}

                  {% for h in forecast_hours %}
                    {% if h[:10] in candidate_days %}
                      {% set hrs.out = hrs.out + [h] %}
                    {% endif %}
                  {% endfor %}

                  {% if (hrs.out | count) > 0 %}
                    {% for hour_key in hrs.out %}
                      {# hour_key format is YYYY-MM-DDTHH:00:00 from merged forecast keys #}
                      {% set forecast_day = hour_key[:10] %}
                      {% set today_day = now().strftime('%Y-%m-%d') %}
                      {% set historical_day_dt = as_datetime(forecast_day) - timedelta(days=7) %}
                      {% set historical_day = historical_day_dt.strftime('%Y-%m-%d') %}
                      {% if historical_day >= today_day %}
                        {% set historical_day_dt = historical_day_dt - timedelta(days=7) %}
                        {% set historical_day = historical_day_dt.strftime('%Y-%m-%d') %}
                      {% endif %}
                      {% set historical_day_data = historical_usage.get(historical_day, {}) %}
                      {% set historical_day_hours = historical_day_data.get('hours', {}) %}
                      {% set historical_day_scale = historical_day_data.get('scale', 1) | float(1) %}
                      {% set historical_hour = hour_key[11:13] %}
                      {% set base_usage_wh = historical_day_hours.get(historical_hour, none) %}
                      {% if base_usage_wh is none %}
                        {% set hourly_usage_wh = hourly_draw_wh | float(0) %}
                      {% else %}
                        {% set hourly_usage_wh = (base_usage_wh | float(0)) * historical_day_scale %}
                      {% endif %}
                      {% set usage.by_hour = usage.by_hour | combine({
                        hour_key: hourly_usage_wh | float(0)
                      }) %}
                    {% endfor %}

                    {% set req = namespace(after=battery_floor_wh | float(0)) %}

                    {% for hour_key in (hrs.out | reverse | list) %}
                      {% set solar_wh = ns.merged.get(hour_key, 0) | float(0) %}
                      {% set hourly_usage_wh = usage.by_hour.get(hour_key, hourly_draw_wh | float(0)) | float(0) %}
                      {% set before = (req.after | float(0)) + hourly_usage_wh - solar_wh %}
                      {% if before < (battery_floor_wh | float(0)) %}
                        {% set before = battery_floor_wh | float(0) %}
                      {% endif %}
                      {% set req.after = before %}
                    {% endfor %}

                    {% if (req.after | float(0)) <= (current_battery_wh | float(0)) %}
                      {% set sim = namespace(level=current_battery_wh | float(0), max=current_battery_wh | float(0)) %}
                      {% for hour_key in hrs.out %}
                        {% set solar_wh = ns.merged.get(hour_key, 0) | float(0) %}
                        {% set hourly_usage_wh = usage.by_hour.get(hour_key, hourly_draw_wh | float(0)) | float(0) %}
                        {% set sim.level = (sim.level | float(0)) + solar_wh - hourly_usage_wh %}
                        {% if (sim.level | float(0)) > (sim.max | float(0)) %}
                          {% set sim.max = sim.level | float(0) %}
                        {% endif %}
                      {% endfor %}
                      {% set ns.best_days = day_count %}
                      {% set ns.best_required = req.after | float(0) %}
                      {% set ns.best_max_battery = sim.max | float(0) %}
                      {% set ns.found = true %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endfor %}

              {% if ns.best_days > 0 %}
                {{ (ns.best_required / 1000) | round(2) }}|{{ ns.best_days }}|{{ ns.hours_found }}|{{ usable_day_count }}|{{ ns.best_max_battery }}|{{ hourly_draw_wh }}
              {% else %}
                -1|0|{{ ns.hours_found }}|{{ usable_day_count }}|{{ current_battery_wh }}|{{ hourly_draw_wh }}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endif %}
      result_export: >-
        {% set current_battery_wh = states(current_battery_entity) | float(none)
        %} {% set daily_draw_kwh = states(daily_draw_entity) | float(none) %} {%
        set sell_by_wh = states(sell_by_wh_entity) | float(none) %} {%
        set sell_by_wh_limit = sell_by_wh | float(0) if sell_by_wh is not none else none %} {%
        set daily_draw_wh = (daily_draw_kwh * 1000) if daily_draw_kwh is not
        none else none %} {% set hourly_draw_wh = (daily_draw_wh / 24) if
        daily_draw_wh is not none else none %} {% set historical_usage =
        historical_usage_estimate_json | from_json if
        historical_usage_estimate_json is string else {} %}

        {% if current_battery_wh is none or hourly_draw_wh is none or sell_by_wh_limit is none %}
          0|0
        {% else %}
          {% set ns = namespace(merged={}) %}
          {% set current_hour_ts = as_timestamp(now().replace(minute=0, second=0, microsecond=0)) %}
          {% for ent in forecast_entities %}
            {% set wp = state_attr(ent, 'wh_period') %}
            {% if wp is mapping %}
              {% for ts, val in wp.items() %}
                {% set t = as_timestamp(ts, default=none) %}
                {% if t is not none and t >= current_hour_ts %}
                  {% set hour_key = as_datetime(ts).strftime('%Y-%m-%dT%H:00:00') %}
                  {% set existing = ns.merged.get(hour_key, 0) | float(0) %}
                  {% set ns.merged = ns.merged | combine({hour_key: existing + (val | float(0))}) %}
                {% endif %}
              {% endfor %}
            {% endif %}
          {% endfor %}

          {% set forecast_hours = ns.merged.keys() | list | sort %}
          {% if (forecast_hours | count) == 0 %}
            0|0
          {% else %}
            {% set export_eval = namespace(
              tomorrow_day=(now() + timedelta(days=1)).strftime('%Y-%m-%d'),
              today_day=now().strftime('%Y-%m-%d'),
              now_hour=now().hour,
              level=current_battery_wh | float(0),
              max_tomorrow=none,
              min_tomorrow=none,
              end_tomorrow=none,
              needs_export=false,
              safe_export_kwh=0,
              export_hours=0
            ) %}
            {% set export_start_hour = export_window_start_hour | int %}
            {% set export_end_hour = export_window_end_hour | int %}
            {% if export_end_hour > export_start_hour %}
              {% set active_export_start = [export_start_hour, export_eval.now_hour] | max %}
              {% if active_export_start < export_end_hour %}
                {% set export_eval.export_hours = export_end_hour - active_export_start %}
              {% endif %}
            {% endif %}
            {% set max_export_kwh_total = (export_eval.export_hours | float(0)) * (max_export_kwh_per_hour | float(10)) %}
            {% for hour_key in forecast_hours %}
              {% set forecast_day = hour_key[:10] %}
              {% set historical_day_dt = as_datetime(forecast_day) - timedelta(days=7) %}
              {% if historical_day_dt.strftime('%Y-%m-%d') >= export_eval.today_day %}
                {% set historical_day_dt = historical_day_dt - timedelta(days=7) %}
              {% endif %}
              {% set historical_day = historical_day_dt.strftime('%Y-%m-%d') %}
              {% set historical_day_data = historical_usage.get(historical_day, {}) %}
              {% set historical_day_hours = historical_day_data.get('hours', {}) %}
              {% set historical_day_scale = historical_day_data.get('scale', 1) | float(1) %}
              {% set historical_hour = hour_key[11:13] %}
              {% set base_usage_wh = historical_day_hours.get(historical_hour, none) %}
              {% if base_usage_wh is none %}
                {% set hourly_usage_wh = hourly_draw_wh | float(0) %}
              {% else %}
                {% set hourly_usage_wh = (base_usage_wh | float(0)) * historical_day_scale %}
              {% endif %}
              {% set solar_wh = ns.merged.get(hour_key, 0) | float(0) %}
              {% set export_eval.level = (export_eval.level | float(0)) + solar_wh - (hourly_usage_wh | float(0)) %}
              {% if forecast_day == export_eval.tomorrow_day %}
                {% if export_eval.max_tomorrow is none or (export_eval.level | float(0)) > (export_eval.max_tomorrow | float(0)) %}
                  {% set export_eval.max_tomorrow = export_eval.level | float(0) %}
                {% endif %}
                {% if export_eval.min_tomorrow is none or (export_eval.level | float(0)) < (export_eval.min_tomorrow | float(0)) %}
                  {% set export_eval.min_tomorrow = export_eval.level | float(0) %}
                {% endif %}
                {% if (hour_key[11:13] | int(0)) == 23 %}
                  {% set export_eval.end_tomorrow = export_eval.level | float(0) %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if export_eval.max_tomorrow is not none and (export_eval.max_tomorrow | float) > sell_by_wh_limit %}
              {% set export_eval.needs_export = true %}
            {% endif %}
            {% if export_eval.needs_export and export_eval.end_tomorrow is not none and export_eval.min_tomorrow is not none and max_export_kwh_total > 0 %}
              {% set end_surplus_kwh = ((export_eval.end_tomorrow | float) - sell_by_wh_limit) / 1000 %}
              {% set min_tomorrow_surplus_kwh = ((export_eval.min_tomorrow | float) - sell_by_wh_limit) / 1000 %}
              {% set exportable_surplus_kwh = [end_surplus_kwh, min_tomorrow_surplus_kwh] | min %}
              {% if exportable_surplus_kwh > 0 %}
                {% if exportable_surplus_kwh < max_export_kwh_total %}
                  {% set export_eval.safe_export_kwh = exportable_surplus_kwh %}
                {% else %}
                  {% set export_eval.safe_export_kwh = max_export_kwh_total %}
                {% endif %}
              {% endif %}
            {% endif %}
            {{ 1 if export_eval.needs_export else 0 }}|{{ export_eval.safe_export_kwh | round(2) }}
          {% endif %}
        {% endif %}
      result: "{{ result_sufficiency }}|{{ result_export }}"
  - action: input_number.set_value
    target:
      entity_id: "{{ required_battery_kwh_entity }}"
    data:
      value: "{{ result.split('|')[0] | float(-1) }}"
  - action: input_number.set_value
    target:
      entity_id: "{{ zero_draw_days_entity }}"
    data:
      value: "{{ result.split('|')[1] | int(0) }}"
  - action: input_number.set_value
    target:
      entity_id: "{{ max_battery_level }}"
    data:
      value: >-
        {% set current_battery_wh = result.split('|')[4] | float(-1) %}
        {{ current_battery_wh }}
  - action: input_number.set_value
    target:
      entity_id: "{{ safe_export_kwh_entity }}"
    data:
      value: "{{ result.split('|')[7] | float(0) }}"
  - action: persistent_notification.create
    data:
      title: Battery estimator debug
      message: |-
        result={{ result }}
        needs_export={{ result.split('|')[6] | int(0) }}
        safe_export_kwh={{ result.split('|')[7] | float(0) }}
mode: single
